<style>
  :root {
    --bg: #f9f8fc;
    --bg-alt: #ffffff;
    --surface: #ffffff;
    --surface-hover: #f3f1f9;
    --border: #e8e5f0;
    --text: #1a1a2e;
    --text-secondary: #5a5870;
    --muted: #9694a8;
    --accent: #7c3aed;
    --accent-hover: #6d28d9;
    --tool-bg: #f5f3ff;
    --tool-border: #ddd6fe;
    --success: #7c3aed;
    --error: #ef4444;
    --user-bg: #f3f1f9;
    --sidebar-bg: #f3f1f9;
    --sidebar-width: 56px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Söhne', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: row;
  }

  /* ── Sidebar ────────────────────────────────────────── */
  #sidebar {
    width: var(--sidebar-width);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0;
    gap: 4px;
    flex-shrink: 0;
  }
  .sidebar-logo {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 20px;
  }
  .sidebar-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    transition: background 0.15s, color 0.15s;
  }
  .sidebar-icon:hover { background: var(--surface-hover); color: var(--text); }
  .sidebar-icon.active { background: var(--surface); color: var(--accent); }
  .sidebar-icon svg { width: 20px; height: 20px; }
  .sidebar-spacer { flex: 1; }

  /* ── Main content area ──────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ── Key setup overlay ───────────────────────────────── */
  #setup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  #setup-overlay.hidden { display: none; }
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .setup-card h2 { font-size: 18px; margin-bottom: 4px; }
  .setup-card .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text-secondary);
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: monospace;
    outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: #aaa; }
  .field .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .field .hint a { color: var(--accent); text-decoration: none; }
  .field .hint a:hover { text-decoration: underline; }
  .setup-actions { margin-top: 24px; }
  .setup-actions button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border: none;
    background: var(--accent);
    color: white;
  }
  .setup-actions button:hover { background: var(--accent-hover); }
  .setup-error { color: var(--error); font-size: 13px; margin-top: 8px; display: none; }

  /* ── Chat area ─────────────────────────────────────────── */
  #chat {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .msg-row {
    padding: 24px 0;
  }
  .msg-row:last-child { padding-bottom: 8px; }
  .msg-inner {
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-avatar.user { background: #a78bfa; color: white; }
  .msg-avatar.assistant { background: var(--accent); color: white; }
  .msg-content {
    flex: 1;
    min-width: 0;
    line-height: 1.7;
    font-size: 15px;
  }
  .msg-content p { margin-bottom: 8px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content code {
    background: #f3f1f9;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--text);
  }
  .msg-content pre {
    background: #f3f1f9;
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .msg-content strong { font-weight: 600; }

  /* ── Tool calls ─────────────────────────────────────────── */
  .tool-call {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px 0 68px;
  }
  .tool-inner {
    background: var(--tool-bg);
    border: 1px solid var(--tool-border);
    border-radius: 10px;
    overflow: hidden;
  }
  .tool-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
  }
  .tool-header:hover { background: rgba(124,58,237,0.06); }
  .tool-header .arrow { transition: transform 0.2s; font-size: 10px; }
  .tool-header .arrow.open { transform: rotate(90deg); }
  .tool-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
    margin-left: auto;
  }
  .tool-badge.running { background: rgba(124,58,237,0.1); color: var(--accent); display: inline-flex; align-items: center; gap: 6px; }
  .tool-badge.running::before {
    content: '';
    width: 10px;
    height: 10px;
    border: 2px solid var(--accent);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tool-badge.done { background: rgba(124,58,237,0.1); color: var(--success); }
  .tool-badge.error { background: rgba(239,68,68,0.1); color: var(--error); }
  .tool-body {
    display: none;
    padding: 0 14px 12px;
    font-size: 13px;
  }
  .tool-body.open { display: block; }
  .tool-body pre {
    background: #f3f1f9;
    padding: 10px;
    border-radius: 6px;
    overflow-x: auto;
    margin-top: 6px;
    color: var(--muted);
  }
  .tool-body label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 8px;
    margin-bottom: 2px;
  }

  /* ── Feedback buttons ───────────────────────────────────── */
  .feedback {
    display: flex;
    gap: 2px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .msg-row:hover .feedback { opacity: 1; }
  .feedback.voted { opacity: 1; }
  .feedback button {
    background: none;
    border: none;
    border-radius: 6px;
    padding: 4px 6px;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    color: var(--muted);
    transition: all 0.15s;
  }
  .feedback button:hover { background: var(--surface-hover); color: var(--text); }
  .feedback button.active { color: var(--accent); }
  .feedback button:disabled { cursor: default; }

  /* ── Input area (shared styles) ─────────────────────────── */
  #input-area {
    padding: 0 24px 24px;
  }
  #input-area.hidden { display: none; }
  #welcome-input-wrap,
  #chat-input-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: flex-end;
    padding: 8px 8px 8px 20px;
    transition: border-color 0.15s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  #chat-input-wrap {
    max-width: 680px;
    margin: 0 auto;
  }
  #welcome-input-wrap { margin-bottom: 0; }
  #welcome-input-wrap:focus-within,
  #chat-input-wrap:focus-within { border-color: var(--accent); }
  #input, #chat-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 24px;
    max-height: 160px;
    padding: 6px 0;
    line-height: 1.5;
  }
  #input::placeholder, #chat-input::placeholder { color: var(--muted); }
  #send, #chat-send {
    background: var(--accent);
    color: #ffffff;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  #send:hover, #chat-send:hover { opacity: 0.8; }
  #send:disabled, #chat-send:disabled { opacity: 0.3; cursor: not-allowed; }
  #send svg, #chat-send svg { width: 18px; height: 18px; }

  .typing { color: var(--muted); font-style: italic; font-size: 14px; }

  /* ── Streaming & loading animations ────────────────── */
  .thinking-dots {
    display: flex;
    gap: 5px;
    padding: 4px 0;
  }
  .thinking-dots span {
    width: 8px;
    height: 8px;
    background: var(--muted);
    border-radius: 50%;
    animation: dot-pulse 1.4s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .streaming-cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--accent);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: cursor-blink 0.7s step-end infinite;
  }
  @keyframes cursor-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── Welcome screen ─────────────────────────────────────── */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  #welcome.hidden { display: none; }
  .welcome-logo {
    width: 40px;
    height: 40px;
    background: var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 24px;
  }
  .welcome-card {
    max-width: 680px;
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    text-align: center;
  }
  .welcome-card h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }
  .welcome-card .subtitle {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
    justify-content: center;
  }
  .suggestions button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    line-height: 1.4;
    transition: background 0.15s, border-color 0.15s;
  }
  .suggestions button:hover { background: var(--surface-hover); border-color: var(--accent); }

  /* ── Settings gear (now in sidebar) ───────────────────── */
</style>
</head>

<script>
// ── Config ──────────────────────────────────────────────────────────
const WORKER_URL = "https://synthflow-proxy.fionn-13d.workers.dev";

// ── Key management ──────────────────────────────────────────────────
function getKeys() {
  return { synthflow: sessionStorage.getItem("synthflow_key") || "" };
}

function hasKeys() {
  return getKeys().synthflow.length > 0;
}

function saveKeys() {
  const sk = document.getElementById("key-synthflow").value.trim();
  const err = document.getElementById("setup-error");

  if (!sk) {
    err.textContent = "Synthflow API key is required.";
    err.style.display = "block";
    return;
  }

  sessionStorage.setItem("synthflow_key", sk);
  posthog.identify(sk);
  posthog.capture("keys_configured");
  hideSetup();
}

function showSetup() {
  document.getElementById("key-synthflow").value = getKeys().synthflow;
  document.getElementById("setup-error").style.display = "none";
  document.getElementById("setup-overlay").classList.remove("hidden");
}

function hideSetup() {
  document.getElementById("setup-overlay").classList.add("hidden");
}

if (hasKeys()) {
  document.getElementById("setup-overlay").classList.add("hidden");
  posthog.identify(getKeys().synthflow);
}

// ── State ───────────────────────────────────────────────────────────
let messages = [];
let busy = false;
let conversationSessionId = crypto.randomUUID();

function newChat() {
  if (busy) return;
  messages = [];
  conversationSessionId = crypto.randomUUID();
  $chat.innerHTML = "";
  $chat.classList.add("hidden");
  $inputArea.classList.add("hidden");
  $welcome.classList.remove("hidden");
  document.getElementById("input").value = "";
}

// ── DOM helpers ─────────────────────────────────────────────────────
const $chat = document.getElementById("chat");
const $welcome = document.getElementById("welcome");
const $inputArea = document.getElementById("input-area");
let $input = document.getElementById("input");
let $send = document.getElementById("send");

function scrollDown() {
  requestAnimationFrame(() => $chat.scrollTo(0, $chat.scrollHeight));
}

const SURVEY_ID = "019d1f98-83b6-0000-7bae-b269a2a30d9e";

function addMsg(role, html, traceId) {
  const row = document.createElement("div");
  row.className = "msg-row";

  const avatar = role === "user" ? "Y" : "A";
  const avatarClass = role === "user" ? "user" : "assistant";

  let feedbackHtml = "";
  if (role === "assistant" && traceId) {
    feedbackHtml = `<div class="feedback"><button onclick="submitFeedback(this,'up','${traceId}')">&#x1F44D;</button><button onclick="submitFeedback(this,'down','${traceId}')">&#x1F44E;</button></div>`;
  }

  row.innerHTML = `<div class="msg-inner"><div class="msg-avatar ${avatarClass}">${avatar}</div><div class="msg-content">${html}${feedbackHtml}</div></div>`;
  $chat.appendChild(row);
  scrollDown();
  return row;
}

function submitFeedback(btn, vote, traceId) {
  const fb = btn.parentElement;
  fb.classList.add("voted");
  fb.querySelectorAll("button").forEach(b => {
    b.classList.remove("active");
    b.disabled = true;
  });
  btn.classList.add("active");
  btn.disabled = false;
  posthog.capture("survey sent", {
    $survey_id: SURVEY_ID,
    $survey_response: vote,
    $ai_trace_id: traceId,
    $ai_session_id: conversationSessionId,
  });
}

function addToolCall(name, input, status = "running") {
  const id = "tool-" + Math.random().toString(36).slice(2, 8);
  const d = document.createElement("div");
  d.className = "tool-call";
  d.id = id;
  d.innerHTML = `<div class="tool-inner">
    <div class="tool-header" onclick="toggleTool('${id}')">
      <span class="arrow" id="${id}-arrow">&#9654;</span>
      <span>${formatToolName(name)}</span>
      <span class="tool-badge ${status}" id="${id}-badge">${status === "running" ? "running..." : status}</span>
    </div>
    <div class="tool-body" id="${id}-body">
      <label>Input</label>
      <pre>${JSON.stringify(input, null, 2)}</pre>
      <div id="${id}-result"></div>
    </div></div>`;
  $chat.appendChild(d);
  scrollDown();
  return id;
}

function updateToolCall(id, status, result) {
  const badge = document.getElementById(id + "-badge");
  const resultEl = document.getElementById(id + "-result");
  if (badge) {
    badge.textContent = status === "done" ? "complete" : status;
    badge.className = `tool-badge ${status}`;
  }
  if (resultEl && result) {
    resultEl.innerHTML = `<label>Result</label><pre>${JSON.stringify(result, null, 2)}</pre>`;
  }
}

function toggleTool(id) {
  document.getElementById(id + "-body").classList.toggle("open");
  document.getElementById(id + "-arrow").classList.toggle("open");
}

function formatToolName(name) {
  return name.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function markdownish(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre>$2</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

// ── Streaming API call ──────────────────────────────────────────────
async function* streamClaude(msgs, traceId) {
  const res = await fetch(`${WORKER_URL}/api/claude`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-synthflow-key": getKeys().synthflow,
      "x-trace-id": traceId,
      "x-session-id": conversationSessionId,
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-5-20250929",
      max_tokens: 8192,
      system: SYSTEM_PROMPT,
      tools: TOOLS,
      messages: msgs,
      stream: true,
    }),
  });
  if (!res.ok) {
    const body = await res.text();
    if (res.status === 401) {
      showSetup();
      throw new Error("Invalid API key. Please check your key and try again.");
    }
    throw new Error(`API error: ${res.status} — ${body.slice(0, 200)}`);
  }
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split("\n");
    buffer = lines.pop();
    for (const line of lines) {
      if (line.startsWith("data: ")) {
        const data = line.slice(6).trim();
        if (data && data !== "[DONE]") {
          try { yield JSON.parse(data); } catch {}
        }
      }
    }
  }
}

async function callSynthflow(method, path, payload, traceId) {
  const keys = getKeys();
  const res = await fetch(`${WORKER_URL}/api/synthflow`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-synthflow-key": keys.synthflow,
      ...(traceId ? { "x-trace-id": traceId } : {}),
      "x-session-id": conversationSessionId,
    },
    body: JSON.stringify({ method, path, payload }),
  });
  if (res.status === 401) {
    showSetup();
    throw new Error("Invalid Synthflow API key. Please check your key and try again.");
  }
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = null; }
  if (!res.ok) {
    if (!data) throw new Error(`Synthflow API error (${res.status}): ${text.slice(0, 200)}`);
    const err = data?.error || data?.message || data?.detail;
    const msg = typeof err === "object" ? JSON.stringify(err) : err || JSON.stringify(data);
    throw new Error(`Synthflow API error (${res.status}): ${msg}`);
  }
  return data || text;
}

// ── Tool execution ──────────────────────────────────────────────────
async function executeTool(name, input, traceId) {
  switch (name) {
    case "create_assistant": {
      const payload = {
        name: input.name,
        type: input.type || "inbound",
        ...(input.agent ? { agent: input.agent } : {}),
        ...(input.actions ? { actions: input.actions } : {}),
        ...(input.is_recording != null ? { is_recording: input.is_recording } : {}),
        ...(input.phone_number ? { phone_number: input.phone_number } : {}),
        ...(input.description ? { description: input.description } : {}),
      };
      return callSynthflow("POST", "/assistants", payload, traceId);
    }

    case "list_assistants": {
      const result = await callSynthflow("GET", `/assistants?limit=${input.limit || 10}`, null, traceId);
      // Trim verbose fields to prevent context explosion
      if (result?.response?.assistants) {
        result.response.assistants = result.response.assistants.map(a => ({
          model_id: a.model_id,
          name: a.name,
          type: a.type,
          phone_number: a.phone_number,
          is_recording: a.is_recording,
          description: a.description,
          agent_summary: a.agent ? {
            llm: a.agent.llm,
            language: a.agent.language,
            voice_name: a.agent.voice_name,
            greeting_message: a.agent.greeting_message,
          } : null,
          actions_count: Array.isArray(a.actions) ? a.actions.length : 0,
          created_at: a.created_at,
        }));
      }
      return result;
    }

    case "update_assistant": {
      const { model_id, ...fields } = input;
      return callSynthflow("PUT", `/assistants/${model_id}`, fields, traceId);
    }

    case "create_call":
      return callSynthflow("POST", "/calls", {
        model_id: input.model_id,
        phone: input.phone,
        name: input.name,
        ...(input.lead_email ? { lead_email: input.lead_email } : {}),
        ...(input.lead_timezone ? { lead_timezone: input.lead_timezone } : {}),
        ...(input.prompt ? { prompt: input.prompt } : {}),
        ...(input.greeting ? { greeting: input.greeting } : {}),
        ...(input.custom_variables ? { custom_variables: input.custom_variables } : {}),
      }, traceId);

    case "add_info_extractors": {
      const current = await callSynthflow("GET", `/assistants/${input.model_id}`, null, traceId);
      const existingActions = current.response?.actions || current.actions || [];
      const newActions = input.extractors.map(e => {
        const config = {};
        config[e.subtype] = {
          identifier: e.identifier,
          description: e.description,
          ...(e.choices ? { choices: e.choices } : {}),
          ...(e.examples ? { examples: e.examples } : {}),
        };
        return { type: "INFORMATION_EXTRACTOR", name: e.name, INFORMATION_EXTRACTOR: config };
      });
      return callSynthflow("PUT", `/assistants/${input.model_id}`, {
        actions: [...existingActions, ...newActions],
      }, traceId);
    }

    case "add_custom_evals": {
      const current = await callSynthflow("GET", `/assistants/${input.model_id}`, null, traceId);
      const existingActions = current.response?.actions || current.actions || [];
      const newActions = input.evals.map(e => ({
        type: "CUSTOM_EVAL",
        name: e.name,
        CUSTOM_EVAL: {
          question: {
            identifier: e.identifier,
            text: e.text,
            category: e.category,
            expected_result: e.expected_result,
          }
        }
      }));
      return callSynthflow("PUT", `/assistants/${input.model_id}`, {
        actions: [...existingActions, ...newActions],
      }, traceId);
    }

    case "create_simulation_suite":
      return callSynthflow("POST", "/simulation_suites", {
        name: input.name,
        model_id: input.model_id,
        ...(input.language ? { language: input.language } : {}),
      }, traceId);

    case "create_simulation_case":
      return callSynthflow("POST", "/simulation_cases", {
        name: input.name,
        prompt: input.prompt,
        type: input.type,
        success_criteria: input.success_criteria,
        call_success_type: input.call_success_type,
        ...(input.suite_id ? { suite_id: input.suite_id } : {}),
        ...(input.base_agent_id ? { base_agent_id: input.base_agent_id } : {}),
      }, traceId);

    case "list_simulation_cases": {
      const path = input.agent_id
        ? `/simulation_cases/by_agent?agent_id=${input.agent_id}`
        : `/simulation_cases?suite_id=${input.suite_id}`;
      return callSynthflow("GET", path, null, traceId);
    }

    case "run_simulation": {
      const query = `?target_agent_id=${input.target_agent_id}${input.max_turns ? `&max_turns=${input.max_turns}` : ""}`;
      return callSynthflow("POST", `/simulation_suites/${input.suite_id}/execute${query}`, null, traceId);
    }

    case "get_simulation_results":
      return callSynthflow("GET", `/simulations/${input.simulation_id}`, null, traceId);

    // ── Voices ─────────────────────────────────────────────────────
    case "list_voices": {
      const limit = input.limit || 50;
      const offset = input.offset || 0;
      return callSynthflow("GET", `/voices?workspace=${encodeURIComponent(input.workspace)}&limit=${limit}&offset=${offset}`, null, traceId);
    }

    // ── Calls (expanded) ───────────────────────────────────────────
    case "list_calls": {
      const params = new URLSearchParams();
      params.set("model_id", input.model_id);
      if (input.limit) params.set("limit", input.limit);
      if (input.offset) params.set("offset", input.offset);
      if (input.from_date) params.set("from_date", input.from_date);
      if (input.to_date) params.set("to_date", input.to_date);
      if (input.call_status) params.set("call_status", input.call_status);
      if (input.duration_min) params.set("duration_min", input.duration_min);
      if (input.duration_max) params.set("duration_max", input.duration_max);
      return callSynthflow("GET", `/calls?${params.toString()}`, null, traceId);
    }

    case "get_call_details":
      return callSynthflow("GET", `/calls/${input.call_id}`, null, traceId);

    // ── Contacts ───────────────────────────────────────────────────
    case "create_contact":
      return callSynthflow("POST", "/contacts", {
        name: input.name,
        phone_number: input.phone_number,
        ...(input.email ? { email: input.email } : {}),
        ...(input.contact_metadata ? { contact_metadata: input.contact_metadata } : {}),
      }, traceId);

    case "find_contact":
      if (input.contact_id) {
        return callSynthflow("GET", `/contacts/${input.contact_id}`, null, traceId);
      }
      return callSynthflow("GET", `/contacts${input.phone ? `?search=${encodeURIComponent(input.phone)}` : ""}`, null, traceId);

    case "update_contact": {
      const { contact_id, ...fields } = input;
      return callSynthflow("PATCH", `/contacts/${contact_id}`, fields, traceId);
    }

    case "delete_contact":
      return callSynthflow("DELETE", `/contacts/${input.contact_id}`, null, traceId);

    // ── Knowledge Bases ────────────────────────────────────────────
    case "list_knowledge_bases": {
      const limit = input.limit || 20;
      const offset = input.offset || 0;
      return callSynthflow("GET", `/knowledge_base?limit=${limit}&offset=${offset}`, null, traceId);
    }

    case "create_knowledge_base":
      return callSynthflow("POST", "/knowledge_base", {
        name: input.name,
        ...(input.rag_use_condition ? { rag_use_condition: input.rag_use_condition } : {}),
      }, traceId);

    case "delete_knowledge_base":
      return callSynthflow("DELETE", `/knowledge_base/${input.kb_id}`, null, traceId);

    case "manage_knowledge_base_agent": {
      if (input.action === "attach") {
        // Attach uses model_id as query parameter, no body
        return callSynthflow("POST", `/knowledge_base/${input.kb_id}/attach?model_id=${encodeURIComponent(input.model_id)}`, null, traceId);
      }
      // Detach uses model_id in body
      return callSynthflow("POST", `/knowledge_base/${input.kb_id}/detach`, {
        model_id: input.model_id,
      }, traceId);
    }

    case "add_knowledge_base_source": {
      const payload = { name: input.name, type: input.type };
      if (input.type === "text") {
        payload.content = input.content;
      } else {
        payload.url = input.url;
      }
      return callSynthflow("POST", `/knowledge_base/${input.kb_id}/sources`, payload, traceId);
    }

    case "list_knowledge_base_sources": {
      const limit = input.limit || 20;
      const offset = input.offset || 0;
      return callSynthflow("GET", `/knowledge_base/${input.kb_id}/sources?limit=${limit}&offset=${offset}`, null, traceId);
    }

    case "delete_knowledge_base_source":
      return callSynthflow("DELETE", `/knowledge_base/${input.kb_id}/sources/${input.source_id}`, null, traceId);

    // ── Standalone Actions ─────────────────────────────────────────
    case "create_action": {
      const { action_type, config } = input;
      // Handle both: config={name,url,...} and config={CUSTOM_ACTION:{name,url,...}}
      const innerConfig = config[action_type] || config;
      // Ensure CUSTOM_ACTION has required run_action_before_call_start default
      if (action_type === "CUSTOM_ACTION" && innerConfig.run_action_before_call_start === undefined) {
        innerConfig.run_action_before_call_start = false;
      }
      return callSynthflow("POST", "/actions", { [action_type]: innerConfig }, traceId);
    }

    case "list_actions": {
      const limit = input.limit || 20;
      const offset = input.offset || 0;
      return callSynthflow("GET", `/actions?limit=${limit}&offset=${offset}`, null, traceId);
    }

    case "delete_action":
      return callSynthflow("DELETE", `/actions/${input.action_id}`, null, traceId);

    case "manage_action_agents":
      return callSynthflow("POST", `/actions/${input.action}`, {
        model_id: input.model_id,
        actions: input.actions,
      }, traceId);

    // ── Subaccounts ───────────────────────────────────────────────
    case "list_subaccounts":
      return callSynthflow("GET", `/subaccounts/?workspace_id=${encodeURIComponent(input.workspace_id)}`, null, traceId);

    default:
      return { error: `Unknown tool: ${name}` };
  }
}

// ── Streaming helpers ────────────────────────────────────────────────
function showThinking() {
  removeThinking();
  const el = document.createElement("div");
  el.id = "thinking-indicator";
  el.className = "msg-row";
  el.innerHTML = `<div class="msg-inner"><div class="msg-avatar assistant">A</div><div class="msg-content"><div class="thinking-dots"><span></span><span></span><span></span></div></div></div>`;
  $chat.appendChild(el);
  scrollDown();
}

function removeThinking() {
  const el = document.getElementById("thinking-indicator");
  if (el) el.remove();
}

function addStreamingMsg() {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `<div class="msg-inner"><div class="msg-avatar assistant">A</div><div class="msg-content"><p></p></div></div>`;
  $chat.appendChild(row);
  scrollDown();
  return row;
}

function updateStreamingMsg(row, text) {
  const content = row.querySelector(".msg-content");
  content.innerHTML = `<p>${markdownish(text)}<span class="streaming-cursor"></span></p>`;
  scrollDown();
}

function finalizeStreamingMsg(row, text, traceId) {
  const content = row.querySelector(".msg-content");
  let feedbackHtml = "";
  if (traceId) {
    feedbackHtml = `<div class="feedback"><button onclick="submitFeedback(this,'up','${traceId}')">&#x1F44D;</button><button onclick="submitFeedback(this,'down','${traceId}')">&#x1F44E;</button></div>`;
  }
  content.innerHTML = `<p>${markdownish(text)}</p>${feedbackHtml}`;
}

// ── Stream processing ────────────────────────────────────────────────
async function processStream(msgs, traceId) {
  let message = null;
  const contentBlocks = [];
  let currentBlock = null;
  let msgRow = null;
  let streamedText = "";
  let thinkingRemoved = false;

  for await (const event of streamClaude(msgs, traceId)) {
    if (!thinkingRemoved) {
      removeThinking();
      thinkingRemoved = true;
    }
    switch (event.type) {
      case "message_start":
        message = event.message;
        break;
      case "content_block_start":
        currentBlock = { ...event.content_block };
        if (currentBlock.type === "text") {
          currentBlock.text = "";
          if (!msgRow) msgRow = addStreamingMsg();
        } else if (currentBlock.type === "tool_use") {
          currentBlock._json = "";
        }
        break;
      case "content_block_delta":
        if (event.delta?.type === "text_delta" && currentBlock) {
          currentBlock.text += event.delta.text;
          streamedText += event.delta.text;
          updateStreamingMsg(msgRow, streamedText);
        } else if (event.delta?.type === "input_json_delta" && currentBlock) {
          currentBlock._json += event.delta.partial_json;
        }
        break;
      case "content_block_stop":
        if (currentBlock?.type === "tool_use" && currentBlock._json) {
          try { currentBlock.input = JSON.parse(currentBlock._json); } catch {}
          delete currentBlock._json;
        }
        contentBlocks.push(currentBlock);
        currentBlock = null;
        break;
      case "message_delta":
        if (message && event.delta) Object.assign(message, event.delta);
        if (event.usage && message) message.usage = { ...message.usage, ...event.usage };
        break;
    }
  }

  if (!thinkingRemoved) removeThinking();
  // Clean up internal _json field from tool_use blocks before they enter conversation history
  for (const block of contentBlocks) {
    if (block.type === "tool_use") {
      if (block._json) {
        try { block.input = JSON.parse(block._json); } catch {}
      }
      delete block._json;
    }
  }
  if (message) message.content = contentBlocks;
  if (msgRow && streamedText) finalizeStreamingMsg(msgRow, streamedText, traceId);
  return message;
}

// ── Agentic loop ────────────────────────────────────────────────────
async function agentLoop(traceId) {
  while (true) {
    const message = await processStream(messages, traceId);
    if (!message || !message.content) break;
    messages.push({ role: "assistant", content: message.content });

    // Handle max_tokens truncation — inject error results for any tool_use blocks
    // so the conversation history stays valid for the Anthropic API
    if (message.stop_reason === "max_tokens") {
      const toolUses = message.content.filter(b => b.type === "tool_use");
      if (toolUses.length > 0) {
        const errorResults = toolUses.map(t => ({
          type: "tool_result",
          tool_use_id: t.id,
          content: "Error: Response was truncated before this tool call could be completed. Please retry with a simpler request.",
          is_error: true,
        }));
        messages.push({ role: "user", content: errorResults });
        addMsg("assistant", "<p>My response was cut short. Let me try again with a simpler approach.</p>");
        continue; // retry the loop so Claude can try again
      }
      break;
    }

    if (message.stop_reason !== "tool_use") break;

    const toolUses = message.content.filter(b => b.type === "tool_use");
    const toolResults = [];
    for (const tool of toolUses) {
      const uiId = addToolCall(tool.name, tool.input);
      let result;
      try {
        result = await executeTool(tool.name, tool.input, traceId);
        updateToolCall(uiId, "done", result);
        posthog.capture("tool_executed", { tool: tool.name, status: "success", $ai_trace_id: traceId, $ai_session_id: conversationSessionId });
      } catch (e) {
        result = { error: e.message };
        updateToolCall(uiId, "error", result);
        posthog.capture("tool_executed", { tool: tool.name, status: "error", error: e.message, $ai_trace_id: traceId, $ai_session_id: conversationSessionId });
      }
      toolResults.push({
        type: "tool_result",
        tool_use_id: tool.id,
        content: JSON.stringify(result),
      });
    }

    messages.push({ role: "user", content: toolResults });
    showThinking();
  }
}

// ── Send message ────────────────────────────────────────────────────
function showChat() {
  if (!$welcome.classList.contains("hidden")) {
    // Transition from welcome to chat mode
    const text = $input.value;
    $welcome.classList.add("hidden");
    $chat.classList.remove("hidden");
    $inputArea.classList.remove("hidden");
    // Switch to chat input
    $input = document.getElementById("chat-input");
    $send = document.getElementById("chat-send");
    $input.value = text;
    $input.addEventListener("input", autoResize);
  }
}

function sanitizeMessages(msgs) {
  const cleaned = [];
  for (let i = 0; i < msgs.length; i++) {
    const msg = msgs[i];
    if (msg.role === "assistant" && Array.isArray(msg.content)) {
      const toolUseIds = msg.content.filter(b => b.type === "tool_use").map(b => b.id);
      if (toolUseIds.length > 0) {
        // Check if next message has matching tool_results
        const next = msgs[i + 1];
        const resolvedIds = new Set();
        if (next && next.role === "user" && Array.isArray(next.content)) {
          next.content.filter(b => b.type === "tool_result").forEach(b => resolvedIds.add(b.tool_use_id));
        }
        const unresolvedIds = toolUseIds.filter(id => !resolvedIds.has(id));
        if (unresolvedIds.length > 0) {
          const unresolvedSet = new Set(unresolvedIds);
          const filteredContent = msg.content.filter(b => !(b.type === "tool_use" && unresolvedSet.has(b.id)));
          if (filteredContent.length > 0) {
            cleaned.push({ ...msg, content: filteredContent });
          }
          continue;
        }
      }
    }
    cleaned.push(msg);
  }
  return cleaned;
}

async function send() {
  // Grab text from whichever input is visible
  const activeInput = $welcome.classList.contains("hidden") ? $input : document.getElementById("input");
  const text = activeInput.value.trim();
  if (!text || busy) return;

  if (!hasKeys()) {
    showSetup();
    return;
  }

  showChat();

  busy = true;
  $send.disabled = true;
  activeInput.value = "";
  $input.value = "";
  $input.style.height = "auto";

  const messageTraceId = crypto.randomUUID();

  addMsg("user", escapeHtml(text));
  posthog.capture("message_sent", { message_length: text.length, conversation_length: messages.length, $ai_trace_id: messageTraceId, $ai_session_id: conversationSessionId });

  showThinking();
  messages.push({ role: "user", content: text });
  messages = sanitizeMessages(messages);

  try {
    await agentLoop(messageTraceId);
  } catch (e) {
    removeThinking();
    addMsg("assistant", `<p style="color:var(--error)">Error: ${escapeHtml(e.message)}</p>`);
    posthog.capture("conversation_error", { error: e.message, $ai_trace_id: messageTraceId, $ai_session_id: conversationSessionId });
    messages.pop();
  }

  busy = false;
  $send.disabled = false;
  $input.focus();
}

function sendExample(btn) {
  document.getElementById("input").value = btn.textContent;
  send();
}

// Auto-resize textarea
function autoResize() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 160) + "px";
}
$input.addEventListener("input", autoResize);
</script>
