<style>
  :root {
    --bg: #212121;
    --bg-alt: #2f2f2f;
    --surface: #303030;
    --surface-hover: #3a3a3a;
    --border: #424242;
    --text: #ececec;
    --text-secondary: #b4b4b4;
    --muted: #8e8e8e;
    --accent: #10a37f;
    --accent-hover: #0d8c6d;
    --tool-bg: #1e2a2a;
    --tool-border: #2a3f3f;
    --success: #10a37f;
    --error: #ef4444;
    --user-bg: #303030;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Söhne', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Key setup overlay ───────────────────────────────── */
  #setup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  #setup-overlay.hidden { display: none; }
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 420px;
    width: 100%;
  }
  .setup-card h2 { font-size: 18px; margin-bottom: 4px; }
  .setup-card .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text-secondary);
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: monospace;
    outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: #555; }
  .field .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .field .hint a { color: var(--accent); text-decoration: none; }
  .field .hint a:hover { text-decoration: underline; }
  .setup-actions { margin-top: 24px; }
  .setup-actions button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border: none;
    background: var(--accent);
    color: white;
  }
  .setup-actions button:hover { background: var(--accent-hover); }
  .setup-error { color: var(--error); font-size: 13px; margin-top: 8px; display: none; }

  /* ── Chat area ─────────────────────────────────────────── */
  #chat {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .msg-row {
    padding: 24px 0;
  }
  .msg-row:last-child { padding-bottom: 8px; }
  .msg-inner {
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-avatar.user { background: #5436da; color: white; }
  .msg-avatar.assistant { background: var(--accent); color: white; }
  .msg-content {
    flex: 1;
    min-width: 0;
    line-height: 1.7;
    font-size: 15px;
  }
  .msg-content p { margin-bottom: 8px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content code {
    background: var(--bg-alt);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .msg-content pre {
    background: #1e1e1e;
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .msg-content strong { font-weight: 600; }

  /* ── Tool calls ─────────────────────────────────────────── */
  .tool-call {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px 0 68px;
  }
  .tool-inner {
    background: var(--tool-bg);
    border: 1px solid var(--tool-border);
    border-radius: 10px;
    overflow: hidden;
  }
  .tool-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
  }
  .tool-header:hover { background: rgba(16,163,127,0.06); }
  .tool-header .arrow { transition: transform 0.2s; font-size: 10px; }
  .tool-header .arrow.open { transform: rotate(90deg); }
  .tool-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
    margin-left: auto;
  }
  .tool-badge.running { background: rgba(16,163,127,0.15); color: var(--accent); }
  .tool-badge.done { background: rgba(16,163,127,0.15); color: var(--success); }
  .tool-badge.error { background: rgba(239,68,68,0.15); color: var(--error); }
  .tool-body {
    display: none;
    padding: 0 14px 12px;
    font-size: 13px;
  }
  .tool-body.open { display: block; }
  .tool-body pre {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 6px;
    overflow-x: auto;
    margin-top: 6px;
    color: var(--muted);
  }
  .tool-body label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 8px;
    margin-bottom: 2px;
  }

  /* ── Feedback buttons ───────────────────────────────────── */
  .feedback {
    display: flex;
    gap: 2px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .msg-row:hover .feedback { opacity: 1; }
  .feedback.voted { opacity: 1; }
  .feedback button {
    background: none;
    border: none;
    border-radius: 6px;
    padding: 4px 6px;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    color: var(--muted);
    transition: all 0.15s;
  }
  .feedback button:hover { background: var(--surface-hover); color: var(--text); }
  .feedback button.active { color: var(--accent); }
  .feedback button:disabled { cursor: default; }

  /* ── Input area ─────────────────────────────────────────── */
  #input-area {
    padding: 0 24px 24px;
  }
  #input-wrap {
    max-width: 680px;
    margin: 0 auto;
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: 24px;
    display: flex;
    align-items: flex-end;
    padding: 8px 8px 8px 20px;
    transition: border-color 0.15s;
  }
  #input-wrap:focus-within { border-color: #555; }
  #input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 24px;
    max-height: 160px;
    padding: 6px 0;
    line-height: 1.5;
  }
  #input::placeholder { color: var(--muted); }
  #send {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  #send:hover { opacity: 0.8; }
  #send:disabled { opacity: 0.3; cursor: not-allowed; }
  #send svg { width: 18px; height: 18px; }

  .typing { color: var(--muted); font-style: italic; font-size: 14px; }

  /* ── Welcome screen ─────────────────────────────────────── */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  #welcome.hidden { display: none; }
  #welcome h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 32px;
    color: var(--text);
  }
  .suggestions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    max-width: 600px;
    width: 100%;
  }
  @media (max-width: 560px) { .suggestions { grid-template-columns: 1fr; } }
  .suggestions button {
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    line-height: 1.4;
    transition: background 0.15s, border-color 0.15s;
  }
  .suggestions button:hover { background: var(--surface-hover); border-color: #555; }

  /* ── Settings gear ──────────────────────────────────────── */
  .gear-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    z-index: 10;
  }
  .gear-btn:hover { background: var(--surface); color: var(--text); }
  .gear-btn svg { width: 20px; height: 20px; display: block; }
</style>
</head>
<body>

<!-- Settings gear -->
<button class="gear-btn" onclick="showSetup()" title="Settings">

</button>

<!-- Key setup overlay -->
<div id="setup-overlay">
  <div class="setup-card">
    <h2>Connect to Synthflow</h2>
    <p class="subtitle">Your key is stored in your browser session only and sent per-request through a secure proxy.</p>
    <div class="field">
      <label>Synthflow API Key</label>
      <input type="password" id="key-synthflow" placeholder="sk_..." autocomplete="off">
      <div class="hint">Get your key at <a href="https://app.synthflow.ai" target="_blank">app.synthflow.ai</a></div>

<!-- Welcome screen -->
<div id="welcome">
  <h1>Synthflow Conductor</h1>
  <div class="suggestions">
    <button onclick="sendExample(this)">Create an inbound support agent</button>
    <button onclick="sendExample(this)">Make an outbound call to a number</button>
    <button onclick="sendExample(this)">Add a live transfer to my assistant</button>
    <button onclick="sendExample(this)">List my assistants</button>
  </div>
</div>

<!-- Chat -->
<div id="chat" class="hidden"></div>

<!-- Input -->
<div id="input-area">
  <div id="input-wrap">
    <textarea id="input" rows="1" placeholder="Message Synthflow Conductor..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="send" onclick="send()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script src="tools.js"></script>
<script>
// ── Config ──────────────────────────────────────────────────────────
const WORKER_URL = "https://synthflow-proxy.fionn-13d.workers.dev";

// ── Key management ──────────────────────────────────────────────────
function getKeys() {
  return { synthflow: sessionStorage.getItem("synthflow_key") || "" };
}

function hasKeys() {
  return getKeys().synthflow.length > 0;
}

function saveKeys() {
  const sk = document.getElementById("key-synthflow").value.trim();
  const err = document.getElementById("setup-error");

  if (!sk) {
    err.textContent = "Synthflow API key is required.";
    err.style.display = "block";
    return;
  }

  sessionStorage.setItem("synthflow_key", sk);
  posthog.identify(sk);
  posthog.capture("keys_configured");
  hideSetup();
}

function showSetup() {
  document.getElementById("key-synthflow").value = getKeys().synthflow;
  document.getElementById("setup-error").style.display = "none";
  document.getElementById("setup-overlay").classList.remove("hidden");
}

function hideSetup() {
  document.getElementById("setup-overlay").classList.add("hidden");
}

if (hasKeys()) {
  document.getElementById("setup-overlay").classList.add("hidden");
  posthog.identify(getKeys().synthflow);
}

// ── State ───────────────────────────────────────────────────────────
let messages = [];
let busy = false;
let conversationTraceId = crypto.randomUUID();
function getSessionId() { return posthog.get_session_id?.() || ""; }

// ── DOM helpers ─────────────────────────────────────────────────────
const $chat = document.getElementById("chat");
const $welcome = document.getElementById("welcome");
const $input = document.getElementById("input");
const $send = document.getElementById("send");

function scrollDown() {
  requestAnimationFrame(() => $chat.scrollTo(0, $chat.scrollHeight));
}

const SURVEY_ID = "019d1f98-83b6-0000-7bae-b269a2a30d9e";

function addMsg(role, html, traceId) {
  const row = document.createElement("div");
  row.className = "msg-row";

  const avatar = role === "user" ? "Y" : "S";
  const avatarClass = role === "user" ? "user" : "assistant";

  let feedbackHtml = "";
  if (role === "assistant" && traceId) {
    feedbackHtml = `<div class="feedback"><button onclick="submitFeedback(this,'up','${traceId}')">&#x1F44D;</button><button onclick="submitFeedback(this,'down','${traceId}')">&#x1F44E;</button></div>`;
  }

  row.innerHTML = `<div class="msg-inner"><div class="msg-avatar ${avatarClass}">${avatar}</div><div class="msg-content">${html}${feedbackHtml}</div></div>`;
  $chat.appendChild(row);
  scrollDown();
  return row;
}

function submitFeedback(btn, vote, traceId) {
  const fb = btn.parentElement;
  fb.classList.add("voted");
  fb.querySelectorAll("button").forEach(b => {
    b.classList.remove("active");
    b.disabled = true;
  });
  btn.classList.add("active");
  btn.disabled = false;
  posthog.capture("survey sent", {
    $survey_id: SURVEY_ID,
    $survey_response: vote,
    $ai_trace_id: traceId,
    $ai_session_id: getSessionId(),
  });
}

function addToolCall(name, input, status = "running") {
  const id = "tool-" + Math.random().toString(36).slice(2, 8);
  const d = document.createElement("div");
  d.className = "tool-call";
  d.id = id;
  d.innerHTML = `<div class="tool-inner">
    <div class="tool-header" onclick="toggleTool('${id}')">
      <span class="arrow" id="${id}-arrow">&#9654;</span>
      <span>${formatToolName(name)}</span>
      <span class="tool-badge ${status}" id="${id}-badge">${status === "running" ? "running..." : status}</span>
    </div>
    <div class="tool-body" id="${id}-body">
      <label>Input</label>
      <pre>${JSON.stringify(input, null, 2)}</pre>
      <div id="${id}-result"></div>
    </div></div>`;
  $chat.appendChild(d);
  scrollDown();
  return id;
}

function updateToolCall(id, status, result) {
  const badge = document.getElementById(id + "-badge");
  const resultEl = document.getElementById(id + "-result");
  if (badge) {
    badge.textContent = status === "done" ? "complete" : status;
    badge.className = `tool-badge ${status}`;
  }
  if (resultEl && result) {
    resultEl.innerHTML = `<label>Result</label><pre>${JSON.stringify(result, null, 2)}</pre>`;
  }
}

function toggleTool(id) {
  document.getElementById(id + "-body").classList.toggle("open");
  document.getElementById(id + "-arrow").classList.toggle("open");
}

function formatToolName(name) {
  return name.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function markdownish(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre>$2</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

// ── API calls ───────────────────────────────────────────────────────
async function callClaude(msgs) {
  const res = await fetch(`${WORKER_URL}/api/claude`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-synthflow-key": getKeys().synthflow,
      "x-trace-id": conversationTraceId,
      "x-session-id": getSessionId(),
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-5-20250929",
      max_tokens: 2048,
      system: SYSTEM_PROMPT,
      tools: TOOLS,
      messages: msgs,
    }),
  });
  if (!res.ok) {
    const body = await res.text();
    if (res.status === 401) {
      showSetup();
      throw new Error("Invalid API key. Please check your key and try again.");
    }
    throw new Error(`API error: ${res.status} — ${body.slice(0, 200)}`);
  }
  return res.json();
}

async function callSynthflow(method, path, payload, traceId) {
  const keys = getKeys();
  const res = await fetch(`${WORKER_URL}/api/synthflow`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-synthflow-key": keys.synthflow,
      ...(traceId ? { "x-trace-id": traceId } : {}),
      "x-session-id": getSessionId(),
    },
    body: JSON.stringify({ method, path, payload }),
  });
  if (res.status === 401) {
    showSetup();
    throw new Error("Invalid Synthflow API key. Please check your key and try again.");
  }
  return res.json();
}

// ── Tool execution ──────────────────────────────────────────────────
async function executeTool(name, input, traceId) {
  switch (name) {
    case "create_assistant": {
      const payload = {
        name: input.name,
        type: input.type || "inbound",
        ...(input.agent ? { agent: input.agent } : {}),
        ...(input.actions ? { actions: input.actions } : {}),
        ...(input.is_recording != null ? { is_recording: input.is_recording } : {}),
        ...(input.phone_number ? { phone_number: input.phone_number } : {}),
        ...(input.description ? { description: input.description } : {}),
      };
      return callSynthflow("POST", "/assistants", payload, traceId);
    }

    case "list_assistants":
      return callSynthflow("GET", `/assistants?limit=${input.limit || 20}`, null, traceId);

    case "update_assistant": {
      const { model_id, ...fields } = input;
      return callSynthflow("PUT", `/assistants/${model_id}`, fields, traceId);
    }

    case "create_call":
      return callSynthflow("POST", "/calls", {
        model_id: input.model_id,
        phone: input.phone,
        name: input.name,
        ...(input.lead_email ? { lead_email: input.lead_email } : {}),
        ...(input.lead_timezone ? { lead_timezone: input.lead_timezone } : {}),
        ...(input.prompt ? { prompt: input.prompt } : {}),
        ...(input.greeting ? { greeting: input.greeting } : {}),
        ...(input.custom_variables ? { custom_variables: input.custom_variables } : {}),
      }, traceId);

    default:
      return { error: `Unknown tool: ${name}` };
  }
}

// ── Agentic loop ────────────────────────────────────────────────────
async function agentLoop(response) {
  while (response.stop_reason === "tool_use") {
    let assistantText = "";
    const toolUses = [];

    for (const block of response.content) {
      if (block.type === "text" && block.text.trim()) {
        assistantText += block.text;
      }
      if (block.type === "tool_use") {
        toolUses.push(block);
      }
    }

    if (assistantText) {
      addMsg("assistant", `<p>${markdownish(assistantText)}</p>`, conversationTraceId);
    }

    messages.push({ role: "assistant", content: response.content });
    const toolResults = [];
    for (const tool of toolUses) {
      const uiId = addToolCall(tool.name, tool.input);

      let result;
      try {
        result = await executeTool(tool.name, tool.input, conversationTraceId);
        updateToolCall(uiId, "done", result);
        posthog.capture("tool_executed", { tool: tool.name, status: "success", $ai_trace_id: conversationTraceId, $ai_session_id: getSessionId() });
      } catch (e) {
        result = { error: e.message };
        updateToolCall(uiId, "error", result);
        posthog.capture("tool_executed", { tool: tool.name, status: "error", error: e.message, $ai_trace_id: conversationTraceId, $ai_session_id: getSessionId() });
      }

      toolResults.push({
        type: "tool_result",
        tool_use_id: tool.id,
        content: JSON.stringify(result),
      });
    }

    messages.push({ role: "user", content: toolResults });
    response = await callClaude(messages);
  }

  const finalText = response.content
    .filter(b => b.type === "text")
    .map(b => b.text)
    .join("");

  if (finalText.trim()) {
    addMsg("assistant", `<p>${markdownish(finalText)}</p>`, conversationTraceId);
  }

  messages.push({ role: "assistant", content: response.content });
}

// ── Send message ────────────────────────────────────────────────────
function showChat() {
  $welcome.classList.add("hidden");
  $chat.classList.remove("hidden");
}

async function send() {
  const text = $input.value.trim();
  if (!text || busy) return;

  if (!hasKeys()) {
    showSetup();
    return;
  }

  showChat();

  busy = true;
  $send.disabled = true;
  $input.value = "";
  $input.style.height = "auto";

  addMsg("user", escapeHtml(text));
  posthog.capture("message_sent", { message_length: text.length, conversation_length: messages.length, $ai_session_id: getSessionId() });

  const typing = addMsg("assistant", '<span class="typing">Thinking...</span>');

  messages.push({ role: "user", content: text });

  try {
    const response = await callClaude(messages);
    typing.remove();
    await agentLoop(response);
  } catch (e) {
    typing.remove();
    addMsg("assistant", `<p style="color:var(--error)">Error: ${escapeHtml(e.message)}</p>`);
    posthog.capture("conversation_error", { error: e.message });
    messages.pop();
  }

  busy = false;
  $send.disabled = false;
  $input.focus();
}

function sendExample(btn) {
  $input.value = btn.textContent;
  send();
}

// Auto-resize textarea
$input.addEventListener("input", () => {
  $input.style.height = "auto";
  $input.style.height = Math.min($input.scrollHeight, 160) + "px";
});
</script>
